<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>แจ้งปัญหาร้านค้า | Thaimart Seller</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --tm-navy: #2B348E;
            --tm-navy-hover: #1c2363;
            --tm-bg: #F5F7FA;
            --tm-text-main: #333333;
            --tm-text-sub: #757575;
            --tm-border: #E0E0E0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--tm-bg);
            color: var(--tm-text-main);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .header-bg {
            background-color: var(--tm-navy);
            color: white;
            padding: 30px 20px 50px 20px;
            text-align: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .header-bg h1 { margin: 0; font-size: 22px; font-weight: 600; }
        .header-bg p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.9; }

        .container {
            max-width: 100%;
            margin: -30px 16px 20px 16px;
            background: #FFFFFF;
            padding: 24px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }

        .form-group { margin-bottom: 18px; }

        label {
            font-weight: 500; display: block; margin-bottom: 8px;
            color: var(--tm-text-main); font-size: 14px;
        }

        input[type="text"], input[type="tel"], input[type="email"], select, textarea, input[type="file"] {
            width: 100%; padding: 12px 14px; border: 1px solid var(--tm-border);
            border-radius: 8px; font-family: 'Prompt', sans-serif; font-size: 16px; 
            box-sizing: border-box; background-color: #FAFAFA; color: var(--tm-text-main);
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--tm-navy); background-color: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(43, 52, 142, 0.1);
        }

        textarea { resize: vertical; min-height: 100px; }

        .file-info { font-size: 12px; color: var(--tm-navy); margin-top: 6px; display: block; }

        hr { border: 0; height: 1px; background: #EAEAEA; margin: 25px 0; }

        button {
            width: 100%; padding: 14px; margin-top: 10px;
            background-color: var(--tm-navy); color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer; font-family: 'Prompt', sans-serif;
            box-shadow: 0 4px 10px rgba(43, 52, 142, 0.2); transition: background-color 0.2s;
        }

        button:active { background-color: var(--tm-navy-hover); }
        button:disabled { background-color: #D1D5DB; box-shadow: none; cursor: not-allowed; color: #FFFFFF; }

        .hidden { display: none; }

        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }

        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid var(--tm-navy);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text" style="margin-top: 16px; font-weight: 500; color: var(--tm-text-sub);">กำลังโหลดข้อมูล...</p>
    </div>

    <div class="header-bg">
        <h1>Thaimart Seller</h1>
        <p>ศูนย์ช่วยเหลือร้านค้า (Seller Support)</p>
    </div>

    <div class="container">
        <form id="ticketForm">
            <input type="hidden" id="userId" name="userId">

            <!-- ข้อมูลส่วนตัว -->
            <div class="form-group">
                <label for="userName">ชื่อ-นามสกุล ผู้ติดต่อ</label>
                <input type="text" id="userName" name="userName" placeholder="ระบุชื่อผู้ประสานงาน" required>
            </div>
            <div class="form-group">
                <label for="userPhone">เบอร์โทรศัพท์ติดต่อ</label>
                <input type="tel" id="userPhone" name="userPhone" placeholder="ระบุเบอร์โทรศัพท์ 10 หลัก" required>
            </div>
            <div class="form-group">
                <label for="userEmail">อีเมล (Email)</label>
                <input type="email" id="userEmail" name="userEmail" placeholder="ระบุอีเมลสำหรับรับแจ้งความคืบหน้า" required>
            </div>

            <hr>

            <!-- ข้อมูลปัญหา -->
            <div class="form-group">
                <label for="shopId">รหัสร้านค้า (Shop ID)</label>
                <input type="text" id="shopId" name="shopId" placeholder="ระบุรหัสร้านค้า เช่น SHOP-999" required>
            </div>
            
            <div class="form-group">
                <label for="sellerIssue">ประเภทปัญหา</label>
                <select id="sellerIssue" name="sellerIssue" onchange="updateDynamicFields()" required>
                    <option value="" disabled selected>-- กรุณาเลือกประเภทปัญหา --</option>
                </select>
            </div>

            <div class="form-group">
                <label id="detailsLabel" for="details">รายละเอียดเพิ่มเติม</label>
                <textarea id="details" name="details" placeholder="ระบุรายละเอียดปัญหาของร้านค้า" required></textarea>
            </div>

            <div class="form-group hidden" id="imageUploadGroup">
                <label for="uploadImages">แนบรูปภาพประกอบ (สูงสุด 5 ภาพ)</label>
                <input type="file" id="uploadImages" accept="image/*" multiple>
                <span class="file-info" id="fileCountInfo">ยังไม่ได้เลือกไฟล์</span>
            </div>

            <button type="submit" id="submitBtn" disabled>ส่งข้อมูลแจ้งปัญหา</button>
        </form>
    </div>

    <script>
        // ⚠️ นำ LIFF ID สำหรับ "ปัญหาร้านค้า" มาใส่
        const LIFF_ID = "2009857349-Pei2JOFr"; 
        
        // ⚠️ นำ Web App URL ของ Thaimart Care มาใส่
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxbB08Shl7ffNj7Tzr2MOkkOXWcX-UPu4I0-jFXfhdNSUWk48iaV_Fl_w2JyBV6SKVW/exec"; 
        
        const CURRENT_ROLE = "Seller";
        let base64ImagesArray = [];

        async function initialize() {
            try {
                fetch(GAS_WEBAPP_URL)
                    .then(response => response.json())
                    .then(configData => {
                        populateSelect('sellerIssue', configData.sellerIssues);
                    });

                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('userId').value = profile.userId;
                    
                    document.getElementById('submitBtn').disabled = false;
                    document.getElementById('loading').style.display = 'none';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loading-text').innerText = "เกิดข้อผิดพลาด กรุณาเปิดใหม่อีกครั้ง";
                document.getElementById('loading-text').style.color = "red";
            }
        }

        function populateSelect(elementId, optionsArray) {
            const selectElement = document.getElementById(elementId);
            optionsArray.forEach(optionText => {
                const opt = document.createElement('option');
                opt.value = optionText;
                opt.innerHTML = optionText;
                selectElement.appendChild(opt);
            });
        }

        function updateDynamicFields() {
            const detailsLabel = document.getElementById('detailsLabel');
            const detailsInput = document.getElementById('details');
            const imageUploadGroup = document.getElementById('imageUploadGroup');
            const selectedValue = document.getElementById('sellerIssue').value || "";

            if (selectedValue.includes("เปลี่ยนแปลงข้อมูล")) {
                detailsLabel.innerText = "ข้อมูลที่ต้องการเปลี่ยนแปลง";
                detailsInput.placeholder = "ระบุข้อมูลเดิม และข้อมูลใหม่ที่ต้องการแก้ไข";
                imageUploadGroup.classList.remove('hidden');
            } else if (selectedValue.includes("การเงิน") || selectedValue.includes("จัดส่ง")) {
                detailsLabel.innerText = "อธิบายปัญหาที่พบ";
                detailsInput.placeholder = "อธิบายรายละเอียดปัญหาอย่างชัดเจน";
                imageUploadGroup.classList.remove('hidden');
            } else {
                detailsLabel.innerText = "รายละเอียดเพิ่มเติม";
                detailsInput.placeholder = "ระบุรายละเอียดปัญหาของร้านค้า";
                imageUploadGroup.classList.add('hidden');
                document.getElementById('uploadImages').value = "";
                document.getElementById('fileCountInfo').innerText = "ยังไม่ได้เลือกไฟล์";
                base64ImagesArray = [];
            }
        }

        function compressImage(file, maxWidth = 1024) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round(height * maxWidth / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        document.getElementById('uploadImages').addEventListener('change', async function(e) {
            const files = e.target.files;
            if (files.length > 5) {
                alert("แนบรูปภาพได้สูงสุด 5 ภาพ");
                e.target.value = '';
                document.getElementById('fileCountInfo').innerText = "เลือกไฟล์เกินกำหนด";
                base64ImagesArray = [];
                return;
            }
            document.getElementById('fileCountInfo').innerText = `กำลังประมวลผล ${files.length} ภาพ...`;
            document.getElementById('submitBtn').disabled = true;
            base64ImagesArray = [];
            
            for(let i = 0; i < files.length; i++) {
                try {
                    const compressedBase64 = await compressImage(files[i]);
                    base64ImagesArray.push(compressedBase64);
                } catch (err) {
                    console.error("Image compression error", err);
                }
            }
            document.getElementById('fileCountInfo').innerText = `แนบรูปภาพแล้ว ${base64ImagesArray.length} ภาพ`;
            document.getElementById('submitBtn').disabled = false;
        });

        document.getElementById('ticketForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading-text').innerText = "กำลังส่งข้อมูลเข้าระบบ...";

            const payload = {
                type: 'liff_ticket',
                userId: document.getElementById('userId').value,
                userType: CURRENT_ROLE,
                userName: document.getElementById('userName').value,
                userPhone: document.getElementById('userPhone').value,
                userEmail: document.getElementById('userEmail').value,
                refId: document.getElementById('shopId').value,
                issueCategory: document.getElementById('sellerIssue').value,
                details: document.getElementById('details').value,
                images: base64ImagesArray
            };

            fetch(GAS_WEBAPP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("ระบบได้รับข้อมูลเรียบร้อยแล้ว กรุณาตรวจสอบในแชท");
                liff.closeWindow();
            })
            .catch(error => {
                alert("บันทึกข้อมูลสำเร็จ กรุณาตรวจสอบในแชท");
                liff.closeWindow();
            });
        });

        window.onload = initialize;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ระบบรับแจ้งปัญหา Thaimart Care</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #E32321;
            --primary-navy: #2B348E;
            --bg-color: #F4F6F8;
            --form-bg: #FFFFFF;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #D1D5DB;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: var(--form-bg);
            padding: 24px 20px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            color: var(--primary-navy);
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
            color: var(--primary-navy);
            font-size: 14px;
        }

        /* บังคับ font-size 16px ป้องกัน iOS Zoom */
        input[type="text"], select, textarea, input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Prompt', sans-serif;
            font-size: 16px; 
            box-sizing: border-box;
            background-color: #FAFAFA;
            color: var(--text-main);
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-navy);
            background-color: #FFFFFF;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .file-info {
            font-size: 12px;
            color: var(--primary-red);
            margin-top: 6px;
            display: block;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background-color: var(--primary-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            box-shadow: 0 4px 6px rgba(227, 35, 33, 0.2);
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
        }

        button:disabled {
            background-color: #cccccc;
            box-shadow: none;
            cursor: not-allowed;
            color: #666666;
        }

        .hidden {
            display: none;
        }

        #statusText {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 16px;
        }
        
        /* สไตล์หน้าจอ Loading */
        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-red);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text" style="margin-top: 15px; font-weight: 600; color: var(--primary-navy);">กำลังเตรียมข้อมูลระบบ...</p>
    </div>

    <div class="container">
        <h2 id="formTitle">ระบบรับแจ้งปัญหา</h2>
        
        <form id="ticketForm">
            <input type="hidden" id="userId" name="userId">

            <div id="customerFields" class="hidden">
                <div class="form-group">
                    <label for="orderId">หมายเลขคำสั่งซื้อ (Order ID)</label>
                    <input type="text" id="orderId" name="orderId" placeholder="ระบุหมายเลขคำสั่งซื้อ เช่น ORD-123456">
                </div>
                
                <div class="form-group">
                    <label for="customerIssue">ประเภทปัญหา</label>
                    <select id="customerIssue" name="customerIssue" onchange="updateDynamicFields('Customer')">
                        <option value="" disabled selected>-- กรุณาเลือกประเภทปัญหา --</option>
                    </select>
                </div>
            </div>

            <div id="sellerFields" class="hidden">
                <div class="form-group">
                    <label for="shopId">รหัสร้านค้า (Shop ID)</label>
                    <input type="text" id="shopId" name="shopId" placeholder="ระบุรหัสร้านค้า เช่น SHOP-999">
                </div>
                
                <div class="form-group">
                    <label for="sellerIssue">ประเภทปัญหา</label>
                    <select id="sellerIssue" name="sellerIssue" onchange="updateDynamicFields('Seller')">
                        <option value="" disabled selected>-- กรุณาเลือกประเภทปัญหา --</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label id="detailsLabel" for="details">รายละเอียดเพิ่มเติม</label>
                <textarea id="details" name="details" placeholder="ระบุรายละเอียดปัญหาที่ท่านพบ" required></textarea>
            </div>

            <div class="form-group hidden" id="imageUploadGroup">
                <label for="uploadImages">แนบรูปภาพประกอบ (สูงสุด 5 ภาพ)</label>
                <input type="file" id="uploadImages" accept="image/*" multiple>
                <span class="file-info" id="fileCountInfo">ยังไม่ได้เลือกไฟล์</span>
            </div>

            <button type="submit" id="submitBtn" disabled>กำลังเชื่อมต่อระบบ...</button>
        </form>

        <div id="statusText">กำลังเตรียมความพร้อมของฟอร์ม...</div>
    </div>

    <script>
        // LIFF ID ของคุณ
        const LIFF_ID = "2009857349-zkJs4iyH"; 
        
        // ⚠️ สำคัญมาก: นำ Web App URL ล่าสุดจาก Google Apps Script มาใส่ที่นี่
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzX0o6-Dcl55VdUaEmtpJ2wrHeEF4NwkTx65IXUjoY00jZXI7PNPE16E2HNysIpLBjM/exec"; 
        
        let currentRole = "";
        let base64ImagesArray = [];

        async function initialize() {
            try {
                // โหลด Config เพื่อทำ Dropdown
                fetch(GAS_WEBAPP_URL)
                    .then(response => response.json())
                    .then(configData => {
                        populateSelect('customerIssue', configData.customerIssues);
                        populateSelect('sellerIssue', configData.sellerIssues);
                    });

                // เริ่มต้น LIFF
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('userId').value = profile.userId;

                    const urlParams = new URLSearchParams(window.location.search);
                    currentRole = urlParams.get('role');

                    setupFormByRole(currentRole);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('statusText').innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาเปิดใหม่อีกครั้ง";
                document.getElementById('loading').style.display = 'none';
            }
        }

        function populateSelect(elementId, optionsArray) {
            const selectElement = document.getElementById(elementId);
            optionsArray.forEach(optionText => {
                const opt = document.createElement('option');
                opt.value = optionText;
                opt.innerHTML = optionText;
                selectElement.appendChild(opt);
            });
        }

        function setupFormByRole(role) {
            if (role === 'Customer') {
                document.getElementById('formTitle').innerText = "แจ้งปัญหาการสั่งซื้อ";
                document.getElementById('customerFields').classList.remove('hidden');
                document.getElementById('customerIssue').required = true;
            } else if (role === 'Seller') {
                document.getElementById('formTitle').innerText = "แจ้งปัญหาร้านค้า";
                document.getElementById('sellerFields').classList.remove('hidden');
                document.getElementById('sellerIssue').required = true;
            } else {
                document.getElementById('statusText').innerText = "สิทธิ์การเข้าถึงไม่ถูกต้อง";
                document.getElementById('loading').style.display = 'none';
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = false;
            submitBtn.innerText = "ส่งข้อมูลแจ้งปัญหา";
            document.getElementById('statusText').innerText = "";
            document.getElementById('loading').style.display = 'none';
        }

        function updateDynamicFields(role) {
            const detailsLabel = document.getElementById('detailsLabel');
            const detailsInput = document.getElementById('details');
            const imageUploadGroup = document.getElementById('imageUploadGroup');
            let selectedValue = "";

            if (role === 'Customer') {
                selectedValue = document.getElementById('customerIssue').value;
            } else {
                selectedValue = document.getElementById('sellerIssue').value;
            }

            // แสดงช่องแนบรูปภาพเมื่อเข้าเงื่อนไขเหล่านี้
            if (selectedValue.includes("คืนสินค้า") || selectedValue.includes("คืนเงิน")) {
                detailsLabel.innerText = "เหตุผลการขอคืนสินค้า/คืนเงิน";
                detailsInput.placeholder = "ระบุเหตุผล เช่น สินค้าชำรุด, ได้รับสินค้าผิดประเภท";
                imageUploadGroup.classList.remove('hidden');
            } else if (selectedValue.includes("ไม่ตรงปก") || selectedValue.includes("ชำรุด")) {
                detailsLabel.innerText = "อธิบายจุดที่สินค้าชำรุดหรือไม่ตรงปก";
                detailsInput.placeholder = "ระบุรายละเอียดอย่างครบถ้วน";
                imageUploadGroup.classList.remove('hidden');
            } else if (selectedValue.includes("เปลี่ยนแปลงข้อมูล")) {
                detailsLabel.innerText = "ข้อมูลที่ต้องการเปลี่ยนแปลง";
                detailsInput.placeholder = "ระบุข้อมูลเดิม และข้อมูลใหม่ที่ต้องการแก้ไข";
                imageUploadGroup.classList.add('hidden');
            } else {
                detailsLabel.innerText = "รายละเอียดเพิ่มเติม";
                detailsInput.placeholder = "ระบุรายละเอียดปัญหาที่ท่านพบ";
                imageUploadGroup.classList.add('hidden');
            }

            // ถ้าช่องรูปภาพถูกซ่อน ให้ล้างค่าไฟล์ที่อาจจะเลือกค้างไว้
            if (imageUploadGroup.classList.contains('hidden')) {
                document.getElementById('uploadImages').value = "";
                document.getElementById('fileCountInfo').innerText = "ยังไม่ได้เลือกไฟล์";
                base64ImagesArray = [];
            }
        }

        // ระบบบีบอัดรูปภาพ
        function compressImage(file, maxWidth = 1024) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = Math.round(height * maxWidth / width);
                            width = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // บีบอัดเหลือ 70% Quality เป็น JPEG
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        document.getElementById('uploadImages').addEventListener('change', async function(e) {
            const files = e.target.files;
            
            if (files.length > 5) {
                alert("กรุณาแนบรูปภาพสูงสุดไม่เกิน 5 ภาพครับ");
                e.target.value = '';
                document.getElementById('fileCountInfo').innerText = "เลือกไฟล์เกินจำนวนที่กำหนด";
                base64ImagesArray = [];
                return;
            }

            document.getElementById('fileCountInfo').innerText = `กำลังประมวลผลรูปภาพ ${files.length} ภาพ...`;
            document.getElementById('submitBtn').disabled = true;
            base64ImagesArray = [];
            
            for(let i = 0; i < files.length; i++) {
                try {
                    const compressedBase64 = await compressImage(files[i]);
                    base64ImagesArray.push(compressedBase64);
                } catch (err) {
                    console.error("Image compression error", err);
                }
            }
            
            document.getElementById('fileCountInfo').innerText = `แนบรูปภาพแล้ว ${base64ImagesArray.length} ภาพ`;
            document.getElementById('submitBtn').disabled = false;
        });

        document.getElementById('ticketForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "กำลังดำเนินการ...";
            document.getElementById('statusText').innerText = "กรุณารอสักครู่ ระบบกำลังส่งข้อมูล";
            
            // เปิดหน้าจอ Loading แบบเต็มจอขณะส่งข้อมูล
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading-text').innerText = "กำลังส่งข้อมูลเข้าระบบ...";

            const payload = {
                type: 'liff_ticket',
                userId: document.getElementById('userId').value,
                userType: currentRole,
                refId: currentRole === 'Customer' ? document.getElementById('orderId').value : document.getElementById('shopId').value,
                issueCategory: currentRole === 'Customer' ? document.getElementById('customerIssue').value : document.getElementById('sellerIssue').value,
                details: document.getElementById('details').value,
                images: base64ImagesArray
            };

            fetch(GAS_WEBAPP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("รับเรื่องเรียบร้อยแล้ว กรุณาตรวจสอบรายละเอียดในแชทครับ");
                liff.closeWindow();
            })
            .catch(error => {
                console.error(error);
                alert("ดำเนินการเสร็จสิ้น กรุณาตรวจสอบในแชทครับ");
                liff.closeWindow();
            });
        });

        window.onload = initialize;
    </script>
</body>
</html>

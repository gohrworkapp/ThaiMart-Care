<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งปัญหา Thaimart Care</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #E32321;
            --primary-navy: #2B348E;
            --bg-color: #F8F9FA;
            --text-color: #333333;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary-navy);
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            color: var(--primary-navy);
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: 'Prompt', sans-serif;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            background-color: var(--primary-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Prompt', sans-serif;
        }

        button:hover {
            background-color: #c01b1a;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }

        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-red);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text" style="margin-top: 15px; font-weight: 600; color: var(--primary-navy);">กำลังเตรียมข้อมูล...</p>
    </div>

    <div class="container">
        <h2 id="formTitle">ระบบแจ้งปัญหา</h2>
        
        <form id="ticketForm">
            <input type="hidden" id="userId" name="userId">

            <div id="customerFields" class="hidden">
                <label for="orderId">หมายเลขคำสั่งซื้อ (Order ID)</label>
                <input type="text" id="orderId" name="orderId" placeholder="ตัวอย่าง ORD-123456">
                
                <label for="customerIssue">ประเภทปัญหา</label>
                <select id="customerIssue" name="customerIssue">
                    <option value="" disabled selected>-- เลือกประเภทปัญหา --</option>
                    <option value="สถานะคำสั่งซื้อ/จัดส่ง">สถานะคำสั่งซื้อและการจัดส่งพัสดุ</option>
                    <option value="คืนสินค้า/คืนเงิน">คืนสินค้า / คืนเงิน</option>
                    <option value="สินค้าไม่ถึง/ส่งช้า">สินค้าไม่ถึง / ส่งช้า</option>
                    <option value="สินค้าไม่ตรงปก">สินค้าไม่ตรงปก / ชำรุด</option>
                </select>
            </div>

            <div id="sellerFields" class="hidden">
                <label for="shopId">รหัสร้านค้า (Shop ID)</label>
                <input type="text" id="shopId" name="shopId" placeholder="ตัวอย่าง SHOP-999">
                
                <label for="sellerIssue">ประเภทปัญหา</label>
                <select id="sellerIssue" name="sellerIssue">
                    <option value="" disabled selected>-- เลือกประเภทปัญหา --</option>
                    <option value="เปลี่ยนแปลงข้อมูลร้านค้า">ขอเปลี่ยนแปลงข้อมูลร้านค้า</option>
                    <option value="ปัญหาระบบ/การใช้งาน">ปัญหาระบบ / การใช้งาน</option>
                    <option value="ปัญหาการเงิน/settlement">ปัญหาการเงิน / Settlement</option>
                    <option value="ปัญหาการจัดส่ง">ปัญหาการจัดส่ง</option>
                </select>
            </div>

            <label for="details">รายละเอียดเพิ่มเติม</label>
            <textarea id="details" name="details" placeholder="ระบุรายละเอียดปัญหาที่พบอย่างครบถ้วน" required></textarea>

            <button type="submit" id="submitBtn">ส่งข้อมูล</button>
        </form>
    </div>

    <script>
        // กรุณานำ LIFF ID และ Web App URL ล่าสุดมาใส่
        const LIFF_ID = "2009857349-zkJs4iyH"; 
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwu91RBjEAGJT5updMurDdMfVjNRbnNlZTS8W0MngP8EHIwtDtKlhUXWMw4upw8HQM_/exec"; 
        let currentRole = "";

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('userId').value = profile.userId;

                    // ดึง Role จาก URL Parameter ที่แชทบอทส่งมา
                    const urlParams = new URLSearchParams(window.location.search);
                    currentRole = urlParams.get('role');

                    setupFormByRole(currentRole);
                }
            } catch (err) {
                console.error("LIFF Initialization failed", err);
                alert("ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่อีกครั้ง");
            }
        }

        function setupFormByRole(role) {
            if (role === 'Customer') {
                document.getElementById('formTitle').innerText = "แจ้งปัญหาการสั่งซื้อ";
                document.getElementById('customerFields').classList.remove('hidden');
            } else if (role === 'Seller') {
                document.getElementById('formTitle').innerText = "แจ้งปัญหาร้านค้า";
                document.getElementById('sellerFields').classList.remove('hidden');
            } else {
                alert("เกิดข้อผิดพลาดในการตรวจสอบสิทธิ์ กรุณาเข้าสู่ระบบผ่านเมนูใน LINE อีกครั้ง");
                liff.closeWindow();
                return;
            }
            document.getElementById('loading').style.display = 'none';
        }

        initializeLiff();

        document.getElementById('ticketForm').addEventListener('submit', function(e) {
            e.preventDefault();

            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading-text').innerText = 'กำลังประมวลผล...';
            document.getElementById('submitBtn').disabled = true;

            const payload = {
                type: 'liff_ticket',
                userId: document.getElementById('userId').value,
                userType: currentRole,
                refId: currentRole === 'Customer' ? document.getElementById('orderId').value : document.getElementById('shopId').value,
                issueCategory: currentRole === 'Customer' ? document.getElementById('customerIssue').value : document.getElementById('sellerIssue').value,
                details: document.getElementById('details').value
            };

            fetch(GAS_WEBAPP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("ระบบได้รับข้อมูลเรียบร้อยแล้ว ทีมงานจะดำเนินการตรวจสอบโดยเร็ว");
                liff.closeWindow();
            })
            .catch(error => {
                console.error('Error:', error);
                alert("ระบบได้รับข้อมูลเรียบร้อยแล้ว ทีมงานจะดำเนินการตรวจสอบโดยเร็ว");
                liff.closeWindow();
            });
        });
    </script>
</body>
</html>
